  push:
  pull_request:

jobs:
  media-suite:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MSYS2 on the Windows runner
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            base-devel
            git
            make
            patch
            unzip
            p7zip
            wget
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Prepare a non-interactive suite config
        shell: pwsh
        run: |
          function Get-ChoiceValue {
            param(
              [string]$Raw,
              [string]$Default
            )

            if ([string]::IsNullOrWhiteSpace($Raw)) {
              return $Default
            }

            if ($Raw -match '^\s*(\d+)') {
              return $Matches[1]
            }

            return $Raw
          }

          $iniOptions = @(
            'arch','license2','vpx2','x2643','x2652','other265','flac','fdkaac','mediainfo',
            'soxB','ffmpegB2','ffmpegUpdate','ffmpegChoice','ffmpegKeepLegacyOpts','mp4box',
            'rtmpdump','mplayer2','mpv','cores','deleteSource','strip','pack','logging','bmx',
            'standalone','updateSuite','av1an','aom','faac','exhale','ffmbc','curl','cyanrip2',
            'rav1e','ripgrep','dav1d','libavif','libheif','vvc','uvg266','jq','dssim',
            'gifski','avs2','dovitool','hdr10plustool','timeStamp','noMintty','ccache',
            'svthevc','svtav1','svtvp9','xvc','jo','vlc','CC','jpegxl','vvenc','vvdec',
            'zlib','ffmpegPath','pkgUpdateTime'
          )

          $optionOverrides = @{
            arch = Get-ChoiceValue '${{ inputs.arch }}' '3'
            license2 = Get-ChoiceValue '${{ inputs.license2 }}' '2'
            vpx2 = Get-ChoiceValue '${{ inputs.vpx2 }}' '1'
            x2643 = Get-ChoiceValue '${{ inputs.x2643 }}' '1'
            x2652 = Get-ChoiceValue '${{ inputs.x2652 }}' '1'
            other265 = Get-ChoiceValue '${{ inputs.other265 }}' '1'
            flac = Get-ChoiceValue '${{ inputs.flac }}' '1'
            fdkaac = Get-ChoiceValue '${{ inputs.fdkaac }}' '1'
            mediainfo = Get-ChoiceValue '${{ inputs.mediainfo }}' '1'
            soxB = Get-ChoiceValue '${{ inputs.soxB }}' '1'
            ffmpegB2 = Get-ChoiceValue '${{ inputs.ffmpegB2 }}' '1'
            ffmpegUpdate = Get-ChoiceValue '${{ inputs.ffmpegUpdate }}' '1'
            ffmpegChoice = Get-ChoiceValue '${{ inputs.ffmpegChoice }}' '2'
            ffmpegKeepLegacyOpts = Get-ChoiceValue '${{ inputs.ffmpegKeepLegacyOpts }}' '1'
            mp4box = Get-ChoiceValue '${{ inputs.mp4box }}' '1'
            rtmpdump = Get-ChoiceValue '${{ inputs.rtmpdump }}' '1'
            mplayer2 = Get-ChoiceValue '${{ inputs.mplayer2 }}' '1'
            mpv = Get-ChoiceValue '${{ inputs.mpv }}' '1'
            cores = '${{ inputs.cores }}'
            deleteSource = Get-ChoiceValue '${{ inputs.deleteSource }}' '2'
            strip = Get-ChoiceValue '${{ inputs.strip }}' '1'
            pack = Get-ChoiceValue '${{ inputs.pack }}' '1'
            logging = Get-ChoiceValue '${{ inputs.logging }}' '1'
            bmx = Get-ChoiceValue '${{ inputs.bmx }}' '1'
            standalone = Get-ChoiceValue '${{ inputs.standalone }}' '1'
            updateSuite = Get-ChoiceValue '${{ inputs.updateSuite }}' '1'
            av1an = Get-ChoiceValue '${{ inputs.av1an }}' '1'
            aom = Get-ChoiceValue '${{ inputs.aom }}' '1'
            faac = Get-ChoiceValue '${{ inputs.faac }}' '1'
            exhale = Get-ChoiceValue '${{ inputs.exhale }}' '1'
            ffmbc = Get-ChoiceValue '${{ inputs.ffmbc }}' '1'
            curl = Get-ChoiceValue '${{ inputs.curl }}' '1'
            cyanrip2 = Get-ChoiceValue '${{ inputs.cyanrip2 }}' '1'
            rav1e = Get-ChoiceValue '${{ inputs.rav1e }}' '1'
            ripgrep = Get-ChoiceValue '${{ inputs.ripgrep }}' '1'
            dav1d = Get-ChoiceValue '${{ inputs.dav1d }}' '1'
            libavif = Get-ChoiceValue '${{ inputs.libavif }}' '1'
            libheif = Get-ChoiceValue '${{ inputs.libheif }}' '1'
            vvc = Get-ChoiceValue '${{ inputs.vvc }}' '1'
            uvg266 = Get-ChoiceValue '${{ inputs.uvg266 }}' '1'
            jq = Get-ChoiceValue '${{ inputs.jq }}' '1'
            dssim = Get-ChoiceValue '${{ inputs.dssim }}' '1'
            gifski = Get-ChoiceValue '${{ inputs.gifski }}' '1'
            avs2 = Get-ChoiceValue '${{ inputs.avs2 }}' '1'
            dovitool = Get-ChoiceValue '${{ inputs.dovitool }}' '1'
            hdr10plustool = Get-ChoiceValue '${{ inputs.hdr10plustool }}' '1'
            timeStamp = Get-ChoiceValue '${{ inputs.timeStamp }}' '1'
            noMintty = Get-ChoiceValue '${{ inputs.noMintty }}' '1'
            ccache = Get-ChoiceValue '${{ inputs.ccache }}' '1'
            svthevc = Get-ChoiceValue '${{ inputs.svthevc }}' '1'
            svtav1 = Get-ChoiceValue '${{ inputs.svtav1 }}' '1'
            svtvp9 = Get-ChoiceValue '${{ inputs.svtvp9 }}' '1'
            xvc = Get-ChoiceValue '${{ inputs.xvc }}' '1'
            jo = Get-ChoiceValue '${{ inputs.jo }}' '1'
            vlc = Get-ChoiceValue '${{ inputs.vlc }}' '1'
            CC = '${{ inputs.CC }}'
            jpegxl = Get-ChoiceValue '${{ inputs.jpegxl }}' '1'
            vvenc = Get-ChoiceValue '${{ inputs.vvenc }}' '1'
            vvdec = Get-ChoiceValue '${{ inputs.vvdec }}' '1'
            zlib = Get-ChoiceValue '${{ inputs.zlib }}' '1'
            ffmpegPath = '${{ inputs.ffmpegPath }}'
            pkgUpdateTime = '${{ inputs.pkgUpdateTime }}'
          }

          $lines = @('[compiler list]')
          foreach ($option in $iniOptions) {
            $value = if ($optionOverrides.ContainsKey($option)) { $optionOverrides[$option] } else { '1' }
            $lines += "$option=$value"
          }

          Set-Content -Path "$env:GITHUB_WORKSPACE\build\media-autobuild_suite.ini" -Value $lines -Encoding UTF8

      - name: Run media-autobuild_suite.bat
        shell: cmd
        run: |
          call media-autobuild_suite.bat
