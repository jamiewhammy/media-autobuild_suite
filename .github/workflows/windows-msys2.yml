name: Windows MSYS2

# GitHub Actions allows at most 10 workflow_dispatch inputs, so the most
# commonly changed options are exposed directly and everything else can be
# set through the free-form "overrides" input (e.g. "fdkaac=2 mpv=2 vlc=2").
on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target build system'
        required: false
        default: '3 - 64-bit build system'
        type: choice
        options:
          - '1 - both (32-bit and 64-bit)'
          - '2 - 32-bit build system'
          - '3 - 64-bit build system'
      license2:
        description: 'FFmpeg license preset'
        required: false
        default: '2 - GPLv3'
        type: choice
        options:
          - '1 - Non-free'
          - '2 - GPLv3'
          - '3 - GPLv2.1'
          - '4 - LGPLv3'
          - '5 - LGPLv2.1'
      ffmpegB2:
        description: 'FFmpeg build type'
        required: false
        default: '1 - Static'
        type: choice
        options:
          - '1 - Static'
          - '2 - No'
          - '3 - Shared'
          - '4 - Both'
          - '5 - Shared libs'
          - '6 - Both static'
      ffmpegChoice:
        description: 'ffmpeg/mpv optional libraries preset'
        required: false
        default: '2 - No (Light build)'
        type: choice
        options:
          - '1 - Yes (customize ffmpeg_options.txt)'
          - '2 - No (Light build)'
          - '3 - No (Mimic Zeranoe)'
          - '4 - No (All available external libs)'
      x2643:
        description: 'x264 build type'
        required: false
        default: '1 - Lib/binary with 8 and 10-bit'
        type: choice
        options:
          - '1 - Lib/binary with 8 and 10-bit'
          - '2 - No'
          - '3 - Lib/binary with only 10-bit'
          - '4 - Lib/binary with 8 and 10-bit, and libavformat and ffms2'
          - '5 - Shared lib/binary with 8 and 10-bit'
          - '6 - Same as 4 with video codecs only'
          - '7 - Lib/binary with only 8-bit'
      x2652:
        description: 'x265 build type'
        required: false
        default: '1 - Lib/binary with Main, Main10 and Main12'
        type: choice
        options:
          - '1 - Lib/binary with Main, Main10 and Main12'
          - '2 - No'
          - '3 - Lib/binary with Main10 only'
          - '4 - Lib/binary with Main only'
          - '5 - Lib/binary with Main, shared libs with Main10 and Main12'
          - '6 - Same as 1 with XP support and non-XP compatible x265-numa.exe'
          - '7 - Lib/binary with Main12 only'
      mpv:
        description: 'Build mpv'
        required: false
        default: 'No'
        type: choice
        options:
          - 'Yes'
          - 'No'
      cores:
        description: 'Number of build cores'
        required: false
        default: '2'
        type: string
      ffmpegPath:
        description: 'FFmpeg source repository override (empty = official)'
        required: false
        default: ''
        type: string
      overrides:
        description: >-
          Extra ini overrides as space-separated key=value pairs, e.g.
          "fdkaac=2 flac=2 vlc=2 zlib=4". Yes/No are accepted as values.
        required: false
        default: ''
        type: string
  push:
  pull_request:

jobs:
  media-suite:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MSYS2 on the Windows runner
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            base-devel
            git
            make
            patch
            unzip
            p7zip
            wget
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Prepare a non-interactive suite config
        shell: pwsh
        env:
          IN_ARCH: ${{ inputs.arch }}
          IN_LICENSE2: ${{ inputs.license2 }}
          IN_FFMPEGB2: ${{ inputs.ffmpegB2 }}
          IN_FFMPEGCHOICE: ${{ inputs.ffmpegChoice }}
          IN_X2643: ${{ inputs.x2643 }}
          IN_X2652: ${{ inputs.x2652 }}
          IN_MPV: ${{ inputs.mpv }}
          IN_CORES: ${{ inputs.cores }}
          IN_FFMPEGPATH: ${{ inputs.ffmpegPath }}
          IN_OVERRIDES: ${{ inputs.overrides }}
        run: |
          function Get-ChoiceValue {
            param(
              [string]$Raw,
              [string]$Default
            )

            if ([string]::IsNullOrWhiteSpace($Raw)) {
              return $Default
            }

            $normalized = $Raw.Trim()

            if ($normalized -match '^(?i)yes') {
              return '1'
            }

            if ($normalized -match '^(?i)no') {
              return '2'
            }

            if ($normalized -match '^(\d+)') {
              return $Matches[1]
            }

            return $normalized
          }

          # Every option the bat file reads from the ini, with a default that
          # answers its interactive prompt. Any 0/missing/empty value would
          # make the bat prompt (and hang the runner), so all must be set.
          $options = [ordered]@{
            arch                 = '3'
            license2             = '2'
            vpx2                 = '1'
            x2643                = '1'
            x2652                = '1'
            other265             = '1'
            flac                 = '1'
            fdkaac               = '1'
            mediainfo            = '1'
            soxB                 = '1'
            ffmpegB2             = '1'
            ffmpegUpdate         = '1'
            ffmpegChoice         = '2'
            ffmpegKeepLegacyOpts = '1'
            mp4box               = '1'
            rtmpdump             = '1'
            mplayer2             = '1'
            mpv                  = '2'
            cores                = '2'
            deleteSource         = '2'
            strip                = '1'
            pack                 = '1'
            logging              = '1'
            bmx                  = '1'
            standalone           = '1'
            updateSuite          = '2'
            av1an                = '1'
            aom                  = '1'
            faac                 = '1'
            exhale               = '1'
            ffmbc                = '1'
            curl                 = '1'
            cyanrip2             = '1'
            rav1e                = '1'
            ripgrep              = '1'
            dav1d                = '1'
            libavif              = '1'
            libheif              = '1'
            vvc                  = '1'
            uvg266               = '1'
            jq                   = '1'
            dssim                = '1'
            gifski               = '1'
            avs2                 = '1'
            dovitool             = '1'
            hdr10plustool        = '1'
            timeStamp            = '1'
            noMintty             = '1'
            ccache               = '1'
            svthevc              = '1'
            svtav1               = '1'
            svtvp9               = '1'
            xvc                  = '1'
            jo                   = '1'
            vlc                  = '1'
            CC                   = '2'
            jpegxl               = '1'
            vvenc                = '1'
            vvdec                = '1'
            zlib                 = '1'
            ffmpegPath           = 'https://git.ffmpeg.org/ffmpeg.git'
            pkgUpdateTime        = '86400'
          }

          # Apply the dedicated workflow_dispatch inputs (empty on push/PR).
          $options['arch']         = Get-ChoiceValue $env:IN_ARCH $options['arch']
          $options['license2']     = Get-ChoiceValue $env:IN_LICENSE2 $options['license2']
          $options['ffmpegB2']     = Get-ChoiceValue $env:IN_FFMPEGB2 $options['ffmpegB2']
          $options['ffmpegChoice'] = Get-ChoiceValue $env:IN_FFMPEGCHOICE $options['ffmpegChoice']
          $options['x2643']        = Get-ChoiceValue $env:IN_X2643 $options['x2643']
          $options['x2652']        = Get-ChoiceValue $env:IN_X2652 $options['x2652']
          $options['mpv']          = Get-ChoiceValue $env:IN_MPV $options['mpv']

          if (-not [string]::IsNullOrWhiteSpace($env:IN_CORES)) {
            $options['cores'] = $env:IN_CORES.Trim()
          }
          if (-not [string]::IsNullOrWhiteSpace($env:IN_FFMPEGPATH)) {
            $options['ffmpegPath'] = $env:IN_FFMPEGPATH.Trim()
          }

          # Apply free-form overrides for everything else.
          if (-not [string]::IsNullOrWhiteSpace($env:IN_OVERRIDES)) {
            foreach ($pair in ($env:IN_OVERRIDES -split '[\s,;]+')) {
              if ([string]::IsNullOrWhiteSpace($pair)) { continue }
              if ($pair -match '^([A-Za-z0-9]+)=(.+)$') {
                $key = $Matches[1]
                $value = $Matches[2]
                if ($options.Contains($key)) {
                  $options[$key] = Get-ChoiceValue $value $options[$key]
                } else {
                  Write-Warning "Ignoring unknown option '$key'"
                }
              } else {
                Write-Warning "Ignoring malformed override '$pair' (expected key=value)"
              }
            }
          }

          $lines = @('[compiler list]')
          foreach ($option in $options.Keys) {
            $lines += "$option=$($options[$option])"
          }

          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\build" | Out-Null
          Set-Content -Path "$env:GITHUB_WORKSPACE\build\media-autobuild_suite.ini" -Value $lines -Encoding utf8NoBOM
          Get-Content "$env:GITHUB_WORKSPACE\build\media-autobuild_suite.ini"

      - name: Run media-autobuild_suite.bat
        shell: cmd
        run: |
          call media-autobuild_suite.bat
