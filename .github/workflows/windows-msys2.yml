name: Windows MSYS2

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Choose the target build system'
        required: false
        default: '3'
        type: choice
        options:
          - '1 - both (32-bit and 64-bit)'
          - '2 - 32-bit build system'
          - '3 - 64-bit build system'
      license2:
        description: 'Choose the FFmpeg license preset'
        required: false
        default: '2'
        type: choice
        options:
          - '1 - Non-free'
          - '2 - GPLv3'
          - '3 - GPLv2.1'
          - '4 - LGPLv3'
          - '5 - LGPLv2.1'
      vpx2:
        description: 'Enable VPX2 support'
        required: false
        default: '1'
        type: choice
        options: ['0', '1']
      x2643:
        description: 'Enable x2643 support'
        required: false
        default: '1'
        type: choice
        options: ['0', '1']
      x2652:
        description: 'Enable x2652 support'
        required: false
        default: '1'
        type: choice
        options: ['0', '1']
      other265:
