name: Windows MSYS2

# All build options come from the committed build/media-autobuild_suite.ini,
# which answers every prompt of media-autobuild_suite.bat so the run is
# fully non-interactive. Edit that file to change what gets built.
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  media-suite:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install MSYS2 on the Windows runner
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            base-devel
            git
            make
            patch
            unzip
            p7zip
            wget
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Show the suite config
        shell: pwsh
        run: Get-Content "$env:GITHUB_WORKSPACE\build\media-autobuild_suite.ini"

      # The suite's compilers run through ccache (ccache=1 in the ini) with
      # the cache at ${LOCALBUILDDIR}/cache, i.e. build\cache. Restore the
      # newest previous cache before building and save a fresh snapshot
      # afterwards. restore/save are split because the combined actions/cache
      # only saves on job success, while failed or timed-out builds are
      # exactly the ones that need to bank their compile progress.
      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: build/cache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.ref_name }}-
            ccache-master-
            ccache-

      - name: Run media-autobuild_suite.bat
        shell: cmd
        env:
          # Keep the cache well under GitHub's 10 GB per-repo limit
          CCACHE_MAXSIZE: 3G
        run: |
          call media-autobuild_suite.bat

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/cache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}

      # On failure the suite zips its diagnostics into build\logs.zip.
      # Upload it (plus any loose suite logs, e.g. when the job timed out
      # before the diagnostics step ran) so failures can be inspected from
      # the run page. failure() || cancelled() also covers the job timeout.
      - name: Upload build logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/logs.zip
            build/*.log
            build/*/ab-suite.*.log
