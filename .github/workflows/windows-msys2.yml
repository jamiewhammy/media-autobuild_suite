name: Windows MSYS2

# All build options come from the committed build/media-autobuild_suite.ini,
# which answers every prompt of media-autobuild_suite.bat so the run is
# fully non-interactive. Edit that file to change what gets built.
#
# No MSYS2 setup step is needed: media-autobuild_suite.bat downloads and
# installs its own MSYS2 environment into .\msys64 (and installs every
# package it needs through pacman). That msys64 folder is cached between
# runs below so later builds skip the download/bootstrap entirely.
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  media-suite:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show the suite config
        shell: pwsh
        run: Get-Content "$env:GITHUB_WORKSPACE\build\media-autobuild_suite.ini"

      # The bat skips its MSYS2 bootstrap when .\msys64 already exists
      # (it checks for msys64\msys2_shell.cmd), so restoring a cached
      # install saves the download, extraction and pacman package setup.
      - name: Restore msys64
        uses: actions/cache/restore@v4
        with:
          path: msys64
          key: msys64-${{ github.run_id }}
          restore-keys: |
            msys64-

      # The suite's compilers run through ccache (ccache=1 in the ini) with
      # the cache at ${LOCALBUILDDIR}/cache, i.e. build\cache. Restore the
      # newest previous cache before building and save a fresh snapshot
      # afterwards. restore/save are split because the combined actions/cache
      # only saves on job success, while failed or timed-out builds are
      # exactly the ones that need to bank their compile progress.
      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: build/cache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.ref_name }}-
            ccache-master-
            ccache-

      - name: Run media-autobuild_suite.bat
        shell: cmd
        env:
          # Keep the cache well under GitHub's 10 GB per-repo limit
          CCACHE_MAXSIZE: 3G
        run: |
          call media-autobuild_suite.bat

      - name: Save msys64
        if: always()
        uses: actions/cache/save@v4
        with:
          path: msys64
          key: msys64-${{ github.run_id }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/cache
          key: ccache-${{ github.ref_name }}-${{ github.run_id }}

      # The suite installs everything it compiles into .\local64 (binaries
      # in bin-video/bin-audio/bin-global, plus libs and headers). Attach
      # it to the run; on failed or timed-out runs this still captures
      # whatever had been built so far.
      - name: Upload compiled output (local64)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local64-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: local64

      # On failure the suite zips its diagnostics into build\logs.zip.
      # Upload it (plus any loose suite logs, e.g. when the job timed out
      # before the diagnostics step ran) so failures can be inspected from
      # the run page. failure() || cancelled() also covers the job timeout.
      - name: Upload build logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/logs.zip
            build/*.log
            build/*/ab-suite.*.log
